name: Rokid Home Assistant Control Kit
version: 0.1.0
slug: rokid_ha_control_kit
description: Expose a secured Rokid Lingzhu SSE endpoint for Home Assistant control.
url: https://github.com/your-org/rokid-glasses-suite
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: services
boot: auto
init: false
ports:
  8080/tcp: 8080
map:
  - share:rw
options:
  ha_url: http://homeassistant.local:8123
  ha_token: replace-with-home-assistant-token
  rokid_auth_ak: replace-with-rokid-auth-ak
  entity_aliases_file: /share/rokid-ha-control-kit/entity_aliases.json
  allowed_entities: ""
  allowed_services: ""
  confirm_token: ""
  audit_log_file: /share/rokid-ha-control-kit/audit.log
schema:
  ha_url: str
  ha_token: password
  rokid_auth_ak: password
  entity_aliases_file: str
  allowed_entities: str?
  allowed_services: str?
  confirm_token: password?
  audit_log_file: str?
