name: Go CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - rokid-ha-control-kit
          - rokid-hermes-connector
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache-dependency-path: ${{ matrix.project }}/go.sum
      - name: Check formatting
        working-directory: ${{ matrix.project }}
        run: test -z "$(gofmt -l .)"
      - name: Test
        working-directory: ${{ matrix.project }}
        run: go test ./...
      - name: Build
        working-directory: ${{ matrix.project }}
        run: go build ./...

  docker:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - rokid-ha-control-kit
          - rokid-hermes-connector
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.project }}
          push: false
          tags: ${{ matrix.project }}:ci
