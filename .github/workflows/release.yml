name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  artifacts:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - rokid-ha-control-kit
          - rokid-hermes-connector
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache-dependency-path: ${{ matrix.project }}/go.sum
      - name: Build release binary
        working-directory: ${{ matrix.project }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          suffix=""
          if [ "$GOOS" = "windows" ]; then suffix=".exe"; fi
          go build -trimpath -ldflags="-s -w" -o "../dist/${{ matrix.project }}-${GOOS}-${GOARCH}${suffix}" .
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.project }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  github-release:
    runs-on: ubuntu-latest
    needs: artifacts
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
